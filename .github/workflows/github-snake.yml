name: Generate Snake

on:
  schedule:
    # Runs once a day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate contribution snake SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            outputs: |
                      dist/github-contribution-grid-snake.svg?color_snake=#38bdf8&color_dots=#0f172a,#1e3a8a,#2563eb,#3b82f6,#38bdf8
                      dist/github-contribution-grid-snake-dark.svg?color_snake=#38bdf8&color_dots=#0f172a,#1e3a8a,#2563eb,#3b82f6,#38bdf8
                      dist/github-contribution-grid-snake.gif?color_snake=#38bdf8&color_dots=#0f172a,#1e3a8a,#2563eb,#3b82f6,#38bdf8

      - name: Push snake output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
