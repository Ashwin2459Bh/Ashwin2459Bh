name: Generate Snake

on:
  schedule:
    # Runs once a day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate contribution snake SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            outputs: |
                      outputs: |
                                dist/github-contribution-grid-snake.svg?color_snake=#4ade80&color_dots=#0e1f14,#14532d,#22c55e,#4ade80,#bbf7d0
                                dist/github-contribution-grid-snake-dark.svg?color_snake=#4ade80&color_dots=#0a0a0a,#14532d,#22c55e,#4ade80,#bbf7d0
                                dist/github-contribution-grid-snake.gif?color_snake=#4ade80&color_dots=#0e1f14,#14532d,#22c55e,#4ade80,#bbf7d0

      - name: Push snake output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
