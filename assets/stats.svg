<svg width="495" height="250" viewBox="0 0 495 250" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #f0abfc; }
    .statLabel { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12.5px; fill: #cbd5e1; }
    .statVal { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12.5px; font-weight: 700; fill: #ffffff; }
    .gradeText { font-family: 'Segoe UI', Arial, sans-serif; font-size: 26px; font-weight: 800; fill: #ffffff; }
    .gradeSub { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #94a3b8; letter-spacing: 1px; }
  </style>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0a0118"/>
    <stop offset="100%" stop-color="#170a30"/>
  </linearGradient>
  <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ff2d95"/>
    <stop offset="100%" stop-color="#38bdf8"/>
  </linearGradient>
  <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff2d95"/>
    <stop offset="50%" stop-color="#a855f7"/>
    <stop offset="100%" stop-color="#38bdf8"/>
  </linearGradient>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#ff6ec7"/>
    <stop offset="100%" stop-color="#7c3aed"/>
  </linearGradient>
  <clipPath id="round"><rect x="0" y="0" width="495" height="250" rx="18"/></clipPath>
</defs>

<g clip-path="url(#round)">
  <rect x="0" y="0" width="495" height="250" fill="url(#bgGrad)"/>
  <g opacity="0.5">
    <circle cx="450" cy="30" r="70" fill="#7c3aed" opacity="0.08"/>
    <circle cx="20" cy="230" r="60" fill="#06b6d4" opacity="0.07"/>
  </g>

  <text x="24" y="34" class="title">Ashwine Daniel's GitHub Stats</text>
  <text x="24" y="52" class="gradeSub">@Ashwin2459Bh &#183; updated automatically</text>

  <!-- grade ring -->
  <g transform="translate(90,175)">
    <circle r="46" fill="none" stroke="#1a0f2e" stroke-width="10"/>
    <circle r="46" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="289.0" stroke-dashoffset="289.0" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" from="289.0" to="11.6" dur="1.6s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </circle>
    <text x="0" y="9" text-anchor="middle" class="gradeText" opacity="0">A+
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.6;1" dur="2s" begin="0.4s" fill="freeze"/>
    </text>
  </g>
  <text x="90" y="235" text-anchor="middle" class="gradeSub">OVERALL GRADE</text>

  <line x1="150" y1="66" x2="150" y2="230" stroke="#3a2a5c" stroke-width="1"/>

  <g>
  <path transform="translate(34,74)" fill="#ff6ec7" d="M0,-7 L2.0,-2.0 L7,0 L2.0,2.0 L0,7 L-2.0,2.0 L-7,0 L-2.0,-2.0 Z"/>
  <text x="52" y="78" class="statLabel">Total Stars Earned</text>
  <text x="445" y="78" text-anchor="end" class="statVal" opacity="0">128
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.346;1" dur="2.6s" begin="0.90s" fill="freeze"/>
  </text>
  <rect x="210" y="67" width="235" height="7" rx="3.5" fill="#1a0f2e" stroke="#3a2a5c" stroke-width="0.7"/>
  <rect x="210" y="67" width="0" height="7" rx="3.5" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="32.0" dur="1.4s" begin="0.90s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
  </rect>
</g>
<g>
  <g transform="translate(34,108)"><circle r="4.2" fill="none" stroke="#ff6ec7" stroke-width="2"/><line x1="-11.2" y1="0" x2="-4.9" y2="0" stroke="#ff6ec7" stroke-width="2"/><line x1="4.9" y1="0" x2="11.2" y2="0" stroke="#ff6ec7" stroke-width="2"/></g>
  <text x="52" y="112" class="statLabel">Total Commits (2026)</text>
  <text x="445" y="112" text-anchor="end" class="statVal" opacity="0">940
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.404;1" dur="2.6s" begin="1.05s" fill="freeze"/>
  </text>
  <rect x="210" y="101" width="235" height="7" rx="3.5" fill="#1a0f2e" stroke="#3a2a5c" stroke-width="0.7"/>
  <rect x="210" y="101" width="0" height="7" rx="3.5" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="235.0" dur="1.4s" begin="1.05s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
  </rect>
</g>
<g>
  <g transform="translate(34,142)" stroke="#ff6ec7" stroke-width="2" fill="none"><circle cx="-5.6" cy="-4.2" r="2.2" fill="#ff6ec7" stroke="none"/><circle cx="-5.6" cy="5.6" r="2.2" fill="#ff6ec7" stroke="none"/><path d="M-5.6,-1.4 L-5.6,3.5"/><path d="M-5.6,-4.2 C4.2,-4.2 6.3,-2.1 6.3,2.1"/></g>
  <text x="52" y="146" class="statLabel">Total PRs</text>
  <text x="445" y="146" text-anchor="end" class="statVal" opacity="0">47
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.462;1" dur="2.6s" begin="1.20s" fill="freeze"/>
  </text>
  <rect x="210" y="135" width="235" height="7" rx="3.5" fill="#1a0f2e" stroke="#3a2a5c" stroke-width="0.7"/>
  <rect x="210" y="135" width="0" height="7" rx="3.5" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="11.8" dur="1.4s" begin="1.20s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
  </rect>
</g>
<g>
  <circle cx="34" cy="176" r="4.9" fill="none" stroke="#ff6ec7" stroke-width="2"/><circle cx="34" cy="176" r="1.6" fill="#ff6ec7"/>
  <text x="52" y="180" class="statLabel">Total Issues</text>
  <text x="445" y="180" text-anchor="end" class="statVal" opacity="0">32
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.519;1" dur="2.6s" begin="1.35s" fill="freeze"/>
  </text>
  <rect x="210" y="169" width="235" height="7" rx="3.5" fill="#1a0f2e" stroke="#3a2a5c" stroke-width="0.7"/>
  <rect x="210" y="169" width="0" height="7" rx="3.5" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="8.0" dur="1.4s" begin="1.35s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
  </rect>
</g>
<g>
  <g transform="translate(27,205.1)" fill="none" stroke="#ff6ec7" stroke-width="1.8"><rect x="0" y="0" width="14.0" height="10.5" rx="1.5"/><line x1="0" y1="3.5" x2="14.0" y2="3.5"/></g>
  <text x="52" y="214" class="statLabel">Contributed to (last yr)</text>
  <text x="445" y="214" text-anchor="end" class="statVal" opacity="0">15
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.577;1" dur="2.6s" begin="1.50s" fill="freeze"/>
  </text>
  <rect x="210" y="203" width="235" height="7" rx="3.5" fill="#1a0f2e" stroke="#3a2a5c" stroke-width="0.7"/>
  <rect x="210" y="203" width="0" height="7" rx="3.5" fill="url(#barGrad)">
    <animate attributeName="width" from="0" to="3.7" dur="1.4s" begin="1.50s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
  </rect>
</g>

  <rect x="0" y="0" width="495" height="250" rx="18" fill="none" stroke="url(#borderGrad)" stroke-width="1.6" opacity="0.7"/>
</g>
</svg>